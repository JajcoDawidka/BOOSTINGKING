<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout - BoostingKing</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="checkout.css" />
</head>
<body>
  <div class="content-container">
    <div class="checkout-container">
      <h1 class="checkout-title">Checkout</h1>

      <form id="checkout-form">
        <div class="form-columns">
          <!-- Personal Info -->
          <div class="section personal-info">
            <h2><span class="icon">👤</span> Personal Info</h2>
            <div class="form-group">
              <label for="firstName">First Name</label>
              <div class="input-container">
                <input type="text" id="firstName" name="firstName" placeholder="John" required class="settings-input" />
              </div>
            </div>
            
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <div class="input-container">
                <input type="text" id="lastName" name="lastName" placeholder="Doe" required class="settings-input" />
              </div>
            </div>
            
            <div class="form-group">
              <label for="email">Email</label>
              <div class="input-container">
                <input type="email" id="email" name="email" placeholder="your@email.com" required class="settings-input" />
              </div>
            </div>
          </div>

          <!-- Boosting Account -->
          <div class="section boosting-account">
            <h2><span class="icon">🔑</span> Account Details</h2>
            <p class="info-note">
              Required only for Solo Boosting. Duo players can skip this section.
            </p>
            
            <div class="form-group">
              <label for="steamLogin">Steam Username</label>
              <div class="input-container">
                <input type="text" id="steamLogin" name="steamLogin" placeholder="Steam username" class="settings-input" />
              </div>
            </div>
            
            <div class="form-group">
              <label for="steamPassword">Steam Password</label>
              <div class="input-container">
                <input type="password" id="steamPassword" name="steamPassword" placeholder="Steam password" class="settings-input" />
              </div>
            </div>
            
            <div class="form-group">
              <label for="faceitEmail">Faceit Email</label>
              <div class="input-container">
                <input type="email" id="faceitEmail" name="faceitEmail" placeholder="Faceit email" class="settings-input" />
              </div>
            </div>
            
            <div class="form-group">
              <label for="faceitPassword">Faceit Password</label>
              <div class="input-container">
                <input type="password" id="faceitPassword" name="faceitPassword" placeholder="Faceit password" class="settings-input" />
              </div>
            </div>
          </div>
        </div>

<div class="section summary">
  <h2><span class="icon">📝</span> Order Summary</h2>
  <div class="simplified-summary">
    <div class="summary-row">
      <span class="summary-label">Base Price:</span>
      <span id="base-price" class="summary-value">$100.00</span>
    </div>
    <div class="summary-row discount">
      <span class="summary-label">Discount:</span>
      <span id="discount-amount" class="summary-value">-$10.00</span>
    </div>
    <div class="summary-row total">
      <span class="summary-label">Total:</span>
      <span id="total-price" class="summary-value">$90.00</span>
    </div>
  </div>
</div>

        <div class="form-actions">
          <button type="button" class="cancel-button">Cancel</button>
          <button type="submit" class="save-button pay-btn">Proceed to Payment</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="checkout.js"></script>
</body>
</html>
